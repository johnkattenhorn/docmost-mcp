services:
  docmost-mcp:
    image: 192.168.1.30:5000/docmost-mcp:latest
    container_name: docmost-mcp
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=http
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.93:4318
      - OTEL_SERVICE_NAME=docmost-mcp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - proxy

networks:
  proxy:
    external: true
